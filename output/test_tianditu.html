<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>天地图API测试</title>
<script src="http://api.tianditu.gov.cn/api?v=4.0&tk=36c2c7b1a00180d86e97fa8ca2cd3bf2"></script>
<style>
body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
#map { width: 100%; height: 500px; border: 1px solid #ccc; }
#info { margin-top: 20px; padding: 10px; background: #f0f0f0; }
.control { position: absolute; top: 80px; left: 20px; z-index: 100; background: white; padding: 10px; border: 1px solid #ccc; }
</style>
</head>
<body>

<h1>天地图API测试</h1>
<div id="info">
  <p>API加载状态: <span id="status">检测中...</span></p>
  <p>地图对象: <span id="mapObj">未创建</span></p>
  <p>标注数量: <span id="markers">0</span></p>
</div>

<div id="map"></div>

<div class="control">
  <button onclick="addTestMarker()">添加测试标注</button>
  <button onclick="addTestPolygon()">添加测试多边形</button>
</div>

<script>
// 检测API加载
window.onload = function() {
  var statusEl = document.getElementById('status');
  var mapObjEl = document.getElementById('mapObj');

  if (typeof T !== 'undefined') {
    statusEl.textContent = '✓ API加载成功';
    statusEl.style.color = 'green';

    // 创建地图
    try {
      var map = new T.Map('map');
      map.centerAndZoom(new T.LngLat(117.44, 28.37), 12);

      mapObjEl.textContent = '✓ 地图创建成功';
      mapObjEl.style.color = 'green';

      console.log('地图对象:', map);

      // 添加测试标注
      window.testMap = map;
      addTestMarker();

    } catch(e) {
      mapObjEl.textContent = '✗ 地图创建失败: ' + e.message;
      mapObjEl.style.color = 'red';
      console.error('地图创建错误:', e);
    }

  } else {
    statusEl.textContent = '✗ API加载失败';
    statusEl.style.color = 'red';
  }
};

function addTestMarker() {
  if (!window.testMap) return;

  try {
    var marker = new T.Marker(new T.LngLat(117.44, 28.37));
    window.testMap.addOverLay(marker);

    var count = parseInt(document.getElementById('markers').textContent) + 1;
    document.getElementById('markers').textContent = count;

    console.log('标注添加成功');
  } catch(e) {
    console.error('标注添加失败:', e);
    alert('标注添加失败: ' + e.message);
  }
}

function addTestPolygon() {
  if (!window.testMap) return;

  try {
    var points = [
      new T.LngLat(117.25, 28.25),
      new T.LngLat(117.25, 28.50),
      new T.LngLat(117.60, 28.50),
      new T.LngLat(117.60, 28.25),
      new T.LngLat(117.25, 28.25)
    ];

    var polygon = new T.Polygon(points, {
      color: '#0066cc',
      weight: 2,
      opacity: 1,
      fillColor: '#66b3ff',
      fillOpacity: 0.3
    });

    window.testMap.addOverLay(polygon);
    console.log('多边形添加成功');
    alert('多边形添加成功！');

  } catch(e) {
    console.error('多边形添加失败:', e);
    alert('多边形添加失败: ' + e.message);
  }
}
</script>

</body>
</html>
