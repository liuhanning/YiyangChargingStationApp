<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍦板尯绠＄悊 - 鍚庡彴绠＄悊绯荤粺</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header nav { display: flex; gap: 20px; }
        .header nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; }
        .header nav a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-secondary { background: #e0e0e0; color: #333; }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 13px; }
        tr:hover { background: #f8f9fa; }
        .actions { display: flex; gap: 8px; }
        .actions a {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            text-decoration: none;
            color: #667eea;
            background: #f0f0ff;
        }
        .actions a:hover { background: #e0e0ff; }
        .actions a.delete { color: #dc2626; background: #fef0f0; }
        .actions a.delete:hover { background: #fee0e0; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 { font-size: 18px; }
        .modal-header .close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-active { background: #d4edda; color: #155724; }
        .badge-inactive { background: #e0e0e0; color: #666; }

        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>鍦板尯绠＄悊</h1>
        <nav>
            <a href="/charging/admin/">棣栭〉</a>
            <a href="/charging/admin/regions" style="background: rgba(255,255,255,0.2);">鍦板尯绠＄悊</a>
            <a href="/charging/admin/layers">鍥惧眰绠＄悊</a>
            <a href="/charging/admin/points">鐐逛綅绠＄悊</a>
            <a href="/">杩斿洖鍓嶇</a>
        </nav>
    </div>

    <div class="container">
        <div class="toolbar">
            <h2>鍦板尯鍒楄〃</h2>
            <div>
                <button class="btn btn-secondary" onclick="syncRegions()">馃攧 鍚屾閰嶇疆</button>
                <button class="btn btn-primary" onclick="showAddModal()">鉃?鏂板鍦板尯</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>鍘垮悕</th>
                        <th>Key</th>
                        <th>琛屾斂浠ｇ爜</th>
                        <th>涓績鍧愭爣</th>
                        <th>鐪佷唤</th>
                        <th>鍩庡競</th>
                        <th>鐘舵€?/th>
                        <th>鎿嶄綔</th>
                    </tr>
                </thead>
                <tbody id="regionTable">
                    <tr><td colspan="8" class="empty-state">鍔犺浇涓?..</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 鏂板/缂栬緫 Modal -->
    <div class="modal" id="regionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">鏂板鍦板尯</h3>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="regionForm">
                    <input type="hidden" id="regionId">
                    <div class="form-group">
                        <label>鍘垮悕 *</label>
                        <input type="text" id="name" required placeholder="渚嬪锛氬紜闃冲幙">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Key *</label>
                            <input type="text" id="key" required placeholder="渚嬪锛歽iyang">
                        </div>
                        <div class="form-group">
                            <label>琛屾斂浠ｇ爜</label>
                            <input type="text" id="adcode" placeholder="渚嬪锛?61126">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>缁忓害</label>
                            <input type="number" step="0.0001" id="lng" placeholder="117.44">
                        </div>
                        <div class="form-group">
                            <label>绾害</label>
                            <input type="number" step="0.0001" id="lat" placeholder="28.37">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>鐪佷唤</label>
                            <input type="text" id="province" placeholder="姹熻タ鐪?>
                        </div>
                        <div class="form-group">
                            <label>鍩庡競</label>
                            <input type="text" id="city" placeholder="涓婇ザ甯?>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>鐘舵€?/label>
                        <select id="isActive">
                            <option value="1">鍚敤</option>
                            <option value="0">鍋滅敤</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">鍙栨秷</button>
                <button class="btn btn-primary" onclick="saveRegion()">淇濆瓨</button>
            </div>
        </div>
    </div>

        <script>
        let regions = [];
        let pendingRequests = 0;

        function setLoading(isLoading) {
            pendingRequests += isLoading ? 1 : -1;
            if (pendingRequests < 0) pendingRequests = 0;
            document.body.style.cursor = pendingRequests > 0 ? 'progress' : '';
        }

        function notify(message, type = 'info') {
            const containerId = 'admin-toast-container';
            let container = document.getElementById(containerId);
            if (!container) {
                container = document.createElement('div');
                container.id = containerId;
                container.style.cssText = 'position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px;max-width:320px;';
                document.body.appendChild(container);
            }

            const bgMap = { success: '#16a34a', error: '#dc2626', info: '#334155' };
            const toast = document.createElement('div');
            toast.style.cssText = `padding:10px 12px;border-radius:8px;color:#fff;background:${bgMap[type] || bgMap.info};box-shadow:0 6px 16px rgba(0,0,0,0.2);font-size:13px;line-height:1.4;`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        async function loadRegions() {
            setLoading(true);
            try {
                const res = await fetch('/charging/admin/api/regions');
                const data = await res.json();
                regions = data.regions || [];
                renderTable();
            } catch (e) {
                console.error('Load regions failed:', e);
                document.getElementById('regionTable').innerHTML = '<tr><td colspan="8" class="empty-state">Load failed</td></tr>';
                notify(`Load failed: ${e.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('regionTable');
            if (regions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No data<br><button class="btn btn-primary" style="margin-top:16px" onclick="showAddModal()">+ Add Region</button></td></tr>';
                return;
            }

            tbody.innerHTML = regions.map(r => `
                <tr>
                    <td>${r.name || '-'}</td>
                    <td><code>${r.key || '-'}</code></td>
                    <td>${r.adcode || '-'}</td>
                    <td>${r.center ? r.center.join(', ') : '-'}</td>
                    <td>${r.province || '-'}</td>
                    <td>${r.city || '-'}</td>
                    <td><span class="badge ${r.is_active ? 'badge-active' : 'badge-inactive'}">${r.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td class="actions">
                        <a href="#" onclick="editRegion(${r.id}); return false;">Edit</a>
                        <a href="#" class="delete" onclick="deleteRegion(${r.id}, decodeURIComponent('${encodeURIComponent(r.name || '')}')); return false;">Delete</a>
                    </td>
                </tr>
            `).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Region';
            document.getElementById('regionForm').reset();
            document.getElementById('regionId').value = '';
            document.getElementById('regionModal').classList.add('active');
        }

        function editRegion(id) {
            const region = regions.find(r => r.id === id);
            if (!region) return;

            document.getElementById('modalTitle').textContent = 'Edit Region';
            document.getElementById('regionId').value = region.id;
            document.getElementById('name').value = region.name || '';
            document.getElementById('key').value = region.key || '';
            document.getElementById('adcode').value = region.adcode || '';
            document.getElementById('province').value = region.province || '';
            document.getElementById('city').value = region.city || '';
            document.getElementById('isActive').value = region.is_active ? '1' : '0';

            if (region.center && Array.isArray(region.center)) {
                document.getElementById('lng').value = region.center[0];
                document.getElementById('lat').value = region.center[1];
            }

            document.getElementById('regionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('regionModal').classList.remove('active');
        }

        async function saveRegion() {
            const id = document.getElementById('regionId').value;
            const data = {
                name: document.getElementById('name').value,
                key: document.getElementById('key').value,
                adcode: document.getElementById('adcode').value,
                province: document.getElementById('province').value,
                city: document.getElementById('city').value,
                is_active: document.getElementById('isActive').value === '1'
            };

            const lng = parseFloat(document.getElementById('lng').value);
            const lat = parseFloat(document.getElementById('lat').value);
            if (!Number.isNaN(lng) && !Number.isNaN(lat)) {
                data.center = [lng, lat];
            }

            setLoading(true);
            try {
                const url = id ? `/charging/admin/api/regions/${id}` : '/charging/admin/api/regions';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (result.success) {
                    notify('Saved', 'success');
                    closeModal();
                    loadRegions();
                } else {
                    notify(`Save failed: ${result.error || 'Unknown error'}`, 'error');
                }
            } catch (e) {
                notify(`Save failed: ${e.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function deleteRegion(id, name) {
            if (!confirm(`Delete region \"${name}\"?`)) return;

            setLoading(true);
            try {
                const res = await fetch(`/charging/admin/api/regions/${id}`, {method: 'DELETE'});
                const result = await res.json();
                if (result.success) {
                    notify('Deleted', 'success');
                    loadRegions();
                } else {
                    notify(`Delete failed: ${result.error || 'Related data exists'}`, 'error');
                }
            } catch (e) {
                notify(`Delete failed: ${e.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        async function syncRegions() {
            if (!confirm('Sync regions from config?')) return;

            setLoading(true);
            try {
                const res = await fetch('/charging/admin/api/regions/sync', {method: 'POST'});
                const result = await res.json();
                if (result.success) {
                    const created = result.result?.created ?? 0;
                    const updated = result.result?.updated ?? 0;
                    notify(`Sync done: created ${created}, updated ${updated}`, 'success');
                    loadRegions();
                } else {
                    notify(`Sync failed: ${result.error || 'Unknown error'}`, 'error');
                }
            } catch (e) {
                notify(`Sync failed: ${e.message}`, 'error');
            } finally {
                setLoading(false);
            }
        }

        loadRegions();
    </script>
</body>
</html>
