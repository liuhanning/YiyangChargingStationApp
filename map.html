        var annoURL = "http://t{s}.tianditu.gov.cn/DataServer?T=cia_w&x={x}&y={y}&l={z}&tk=36c2c7b1a00180d86e97fa8ca2cd3bf2";
        vectorLayer = new T.TileLayer(annoURL, { minZoom: 1, maxZoom: 18, subdomains: ['0', '1', '2', '3', '4', '5', '6', '7'] });
        map.addLayer(vectorLayer);
      }
    }

    // 创建县域高亮效果 - 参考001截图风格
    // 县域内：浅白色/淡黄色高亮（干净明亮）
    // 县域外：浅灰色半透明遮罩（柔和不刺眼）
    // 边界线：红色/橙色醒目描边
    function createCountyHighlight(countyBounds) {
      console.log('创建县域高亮效果，边界点数:', countyBounds.length);

      // 1. 外部遮罩 - 浅灰色半透明（带镂空，不遮挡内部）
      var outerBounds = [
        [110.0, 20.0], [125.0, 20.0], [125.0, 35.0], [110.0, 35.0], [110.0, 20.0]
      ];

      var maskPoints = outerBounds.map(function (p) { return new T.LngLat(p[0], p[1]); });
      var countyPoints = countyBounds.map(function (p) { return new T.LngLat(p[0], p[1]); });

      // 使用双数组作为坐标实现镂空
      maskOverlay = new T.Polygon([maskPoints, countyPoints], {
        color: 'transparent',
        weight: 0,
        opacity: 0,
        fillColor: '#8a8a8a',
        fillOpacity: 0.35
      });
      map.addOverLay(maskOverlay);

      // 2. 县域范围多边形 - 浅淡高亮 + 红色粗边框（强调县域边界）
      countyPolygon = new T.Polygon(countyPoints, {
        color: '#cc3333',
        weight: 3,
        opacity: 0.9,
        fillColor: '#fffff0',
        fillOpacity: 0.45
      });
      map.addOverLay(countyPolygon);

      // 3. 添加县名标注
      var centerLng = 117.42;
      var centerLat = 28.38;
      countyLabel = new T.Label({
        text: '弋阳县',
        position: new T.LngLat(centerLng, centerLat),
        offset: new T.Point(-30, -12)
      });
      countyLabel.setFontSize(18);
      countyLabel.setFontColor('#1a3a5c');
      countyLabel.setBorderColor('transparent');
      countyLabel.setBackgroundColor('rgba(255,255,255,0.7)');
      map.addOverLay(countyLabel);

      // 4. 自适应视图到县域边界（稍微外扩一些）
      map.setViewport(countyPoints);

      console.log('✓ 县域高亮效果创建完成');
    }

    // 添加乡镇名称标注
    function addTownshipLabels() {

        { name: '弋江镇', lng: 117.434, lat: 28.402 },
        { name: '南岩镇', lng: 117.455, lat: 28.370 },
        { name: '桃源街道', lng: 117.458, lat: 28.420 },
        { name: '花亭乡', lng: 117.395, lat: 28.447 },
        { name: '圭峰镇', lng: 117.405, lat: 28.310 },
        { name: '叠山镇', lng: 117.335, lat: 28.360 },
        { name: '漆工镇', lng: 117.350, lat: 28.460 },
        { name: '湾里乡', lng: 117.503, lat: 28.490 },
        { name: '葛溪乡', lng: 117.540, lat: 28.560 },
        { name: '中畈乡', lng: 117.490, lat: 28.215 },
        { name: '港口镇', lng: 117.310, lat: 28.290 },
        { name: '清湖乡', lng: 117.538, lat: 28.430 },
        { name: '旭光乡', lng: 117.310, lat: 28.530 },
        { name: '樟树墩镇', lng: 117.290, lat: 28.615 },
        { name: '曹溪镇', lng: 117.460, lat: 28.155 },
        { name: '三县岭镇', lng: 117.555, lat: 28.660 }
      ];

      townships.forEach(function (t) {

        });

    // 绘制现有充电站 - 绿色圆点 + 白色闪电图标
    function plotUrban() {
      URBAN.forEach(function (d) {
        var marker = new T.Marker(new T.LngLat(d.lng, d.lat), {
          icon: createIcon('#2ecc40', '⚡', 24)
        });
        marker.addEventListener('click', function () {
          var infoWin = new T.InfoWindow();
          infoWin.setContent(
            '<div class="info-window">' +
            '<div class="info-title">⚡ ' + d.name + '</div>' +
            '<div class="info-row">📍 地址：<b>' + d.addr + '</b></div>' +
            '<div class="info-row">📐 坐标：' + d.lng.toFixed(6) + ', ' + d.lat.toFixed(6) + '</div>' +
            '<div class="info-row"><span class="badge badge-green">✅ 已建成运营</span></div>' +
            '</div>'
          );
          infoWin.setLngLat(new T.LngLat(d.lng, d.lat));
          map.openInfoWindow(infoWin);
        });
        map.addOverLay(marker);
        layers.urban.push(marker);
      });
    }

    // 绘制加油站 - 橙色圆点
    function plotGas() {
      GAS.forEach(function (d) {
        var lng = 117.44 + (Math.random() - 0.5) * 0.2;
        var lat = 28.37 + (Math.random() - 0.5) * 0.2;

        var marker = new T.Marker(new T.LngLat(lng, lat), {
          icon: createIcon('#e67e22', '⛽', 22)
        });
        marker.addEventListener('click', function () {
          var infoWin = new T.InfoWindow();
          infoWin.setContent(
            '<div class="info-window">' +
            '<div class="info-title">⛽ ' + d.name + '</div>' +
            '<div class="info-row">📍 地址：<b>' + d.addr + '</b></div>' +
            '<div class="info-row">📊 年销量：<b>' + d.sales.toLocaleString() + ' 吨</b></div>' +
            '<div class="info-row">💰 油品收入：<b>' + d.revenue.toLocaleString() + ' 万元</b></div>' +
            '<div class="info-row"><span class="badge ' + (d.has_ev ? 'badge-green' : 'badge-orange') + '">' +
            (d.has_ev ? '✅ 已有充电设施' : '⚠️ 待改造升级') + '</span></div>' +
            '</div>'
          );
          infoWin.setLngLat(new T.LngLat(lng, lat));
          map.openInfoWindow(infoWin);
        });
        map.addOverLay(marker);
        layers.gas.push(marker);
      });
    }

    // 绘制规划充电站 - 蓝色圆点
    function plotPlan() {
      PLAN.forEach(function (d) {
        var lng = 117.44 + (Math.random() - 0.5) * 0.2;
        var lat = 28.37 + (Math.random() - 0.5) * 0.2;

        var marker = new T.Marker(new T.LngLat(lng, lat), {
          icon: createIcon('#3498db', '🔋', 22)
        });
        marker.addEventListener('click', function () {
          var infoWin = new T.InfoWindow();
          infoWin.setContent(
            '<div class="info-window">' +
            '<div class="info-title">🔋 ' + d.name + '</div>' +
            '<div class="info-row">🏘️ 乡镇：<b>' + d.township + '</b>　📋 场景：<b>' + d.scene + '</b></div>' +
            '<div class="info-row">🔌 桩数：<b>' + d.qty + ' 台</b>　⚡ 功率：<b>' + d.power + ' kW</b></div>' +
            '<div class="info-row">🔧 设备：<b>' + d.equip + '</b></div>' +
            '<div class="info-row"><span class="badge badge-blue">📅 ' + d.year + ' 年建设</span></div>' +
            '</div>'
          );
          infoWin.setLngLat(new T.LngLat(lng, lat));
          map.openInfoWindow(infoWin);
        });
        map.addOverLay(marker);
        layers.plan.push(marker);
      });
    }

    // 创建自定义圆形图标（更精美的效果）
    function createIcon(color, text, size) {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + (size + 8) + '" height="' + (size + 12) + '" viewBox="0 0 ' + (size + 8) + ' ' + (size + 12) + '">' +
        '<defs>' +
        '<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">' +
        '<feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>' +
        '</filter>' +
        '</defs>' +
        '<ellipse cx="' + ((size + 8) / 2) + '" cy="' + (size + 8) + '" rx="' + (size * 0.25) + '" ry="' + (size * 0.1) + '" fill="rgba(0,0,0,0.15)"/>' +
        '<circle cx="' + ((size + 8) / 2) + '" cy="' + ((size + 4) / 2) + '" r="' + (size / 2 + 1) + '" fill="' + color + '" stroke="white" stroke-width="2.5" filter="url(#shadow)"/>' +
        '<text x="50%" y="' + ((size + 4) / 2) + '" text-anchor="middle" dy=".35em" font-size="' + Math.floor(size * 0.55) + '" fill="white">' + text + '</text>' +
        '</svg>';
      var icon = new T.Icon({
        iconUrl: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
        iconSize: new T.Point(size + 8, size + 12),
        iconAnchor: new T.Point((size + 8) / 2, (size + 8) / 2)
      });
      return icon;
    }

    // 切换图层显示
    function toggleLayer(name, show) {
      layers[name].forEach(function (marker) {
        if (show) {
          map.addOverLay(marker);
        } else {
          map.removeOverLay(marker);
        }
      });
    }

    // 切换边界显示
    function toggleBoundary(show) {
      if (maskOverlay && countyPolygon) {
        if (show) {
          map.addOverLay(maskOverlay);
          map.addOverLay(countyPolygon);
          if (countyLabel) map.addOverLay(countyLabel);
        } else {
          map.removeOverLay(maskOverlay);
          map.removeOverLay(countyPolygon);
          if (countyLabel) map.removeOverLay(countyLabel);
        }
      }
    }

    // 隐藏县外
    function toggleHideOutside(hide) {
      if (!maskOverlay) return;
      if (hide) {
        maskOverlay.setFillColor('#f0f2f5');
        maskOverlay.setFillOpacity(1.0);
      } else {
        maskOverlay.setFillColor('#8a8a8a');
        maskOverlay.setFillOpacity(0.35);
      }
    }

    // 设置显示模式
    function setMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(function (btn) {
        btn.classList.remove('active');
      });
      event.target.closest('.mode-btn').classList.add('active');

      var checkboxes = document.querySelectorAll('.toggle input[type="checkbox"]');

      switch (mode) {
        case 'all':
          toggleLayer('urban', true);
          toggleLayer('gas', true);
          toggleLayer('plan', true);
          toggleBoundary(true);
          checkboxes[0].checked = true;
          checkboxes[1].checked = true;
          checkboxes[2].checked = true;
          checkboxes[3].checked = true;
          break;
        case 'boundary':
          toggleLayer('urban', false);
          toggleLayer('gas', false);
          toggleLayer('plan', false);
          toggleBoundary(true);
          checkboxes[0].checked = false;
          checkboxes[1].checked = false;
          checkboxes[2].checked = false;
          checkboxes[3].checked = true;
          break;
        case 'current':
          toggleLayer('urban', true);
          toggleLayer('gas', false);
          toggleLayer('plan', false);
          toggleBoundary(true);
          checkboxes[0].checked = true;
          checkboxes[1].checked = false;
          checkboxes[2].checked = false;
          checkboxes[3].checked = true;
          break;
        case 'planning':
          toggleLayer('urban', false);
          toggleLayer('gas', false);
          toggleLayer('plan', true);
          toggleBoundary(true);
          checkboxes[0].checked = false;
          checkboxes[1].checked = false;
          checkboxes[2].checked = true;
          checkboxes[3].checked = true;
          break;
      }
    }

    // 页面加载完成后初始化地图
    window.onload = initMap;
  </script>
